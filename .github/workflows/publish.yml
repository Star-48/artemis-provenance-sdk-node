name: Publish to npm
# Publishes on a GitHub Release. Tag the release with the version (e.g. v0.1.0).
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Publishes with a signed provenance statement. Set the NPM_TOKEN secret to a
      # granular automation token, OR configure an npm OIDC trusted publisher and
      # drop NODE_AUTH_TOKEN.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
